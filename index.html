<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F5EFE6" />
  <title>Sanitär GBS – Lernplattform</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body>
  <a href="#main" class="skip-link">Zum Inhalt springen</a>

  <header class="topbar" role="banner">
    <a href="#/" class="brand" data-link aria-label="Startseite">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="28" height="28">
          <path d="M16 3c-4 6-8 10-8 15a8 8 0 0 0 16 0c0-5-4-9-8-15z" fill="currentColor" />
        </svg>
      </span>
      <span class="brand-text">
        <strong>Sanitär GBS</strong>
        <small>Lernplattform · St. Gallen</small>
      </span>
    </a>

    <form class="topbar-search" id="topbar-search" role="search" aria-label="Globale Suche">
      <label class="visually-hidden" for="topbar-search-input">Suche</label>
      <input id="topbar-search-input" type="search" placeholder="Suche nach Thema, Begriff, Auftrag …" autocomplete="off" />
      <button type="submit" class="btn btn-primary" aria-label="Suche starten">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span class="btn-label">Suchen</span>
      </button>
    </form>

    <nav class="topnav" aria-label="Hauptnavigation">
      <a href="#/" data-link>Start</a>
      <a href="#/semester" data-link>Semester</a>
      <a href="#/pfad" data-link>Chronologie</a>
      <a href="#/suche" data-link>Suche</a>
      <a href="#/kompetenzen" data-link>Handlungskompetenzen</a>
      <a href="#/info" data-link>Info</a>
    </nav>
  </header>

  <main id="main" class="main" tabindex="-1">
    <div id="view" class="view" aria-live="polite"></div>
  </main>

  <nav class="bottomnav" aria-label="Mobile Hauptnavigation">
    <a href="#/" data-link>
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      <span>Start</span>
    </a>
    <a href="#/semester" data-link>
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M3 9h18M8 4v3M16 4v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Semester</span>
    </a>
    <a href="#/suche" data-link>
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Suche</span>
    </a>
    <a href="#/kompetenzen" data-link>
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M4 5h16v4H4zM4 11h16v4H4zM4 17h16v3H4z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      <span>Komp.</span>
    </a>
    <a href="#/info" data-link>
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 11v6M12 7.5v.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Info</span>
    </a>
  </nav>

  <footer class="footer">
    <small>GBS St. Gallen · Fachgruppe Sanitär &amp; Spengler · Version 1.0 (Prototyp)</small>
  </footer>

  <!-- PDF-Viewer-Modal -->
  <div id="pdf-modal" class="modal" hidden aria-hidden="true" role="dialog" aria-modal="true" aria-label="PDF-Anzeige">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-panel">
      <header class="modal-header">
        <h2 id="pdf-modal-title">Auftrag</h2>
        <div class="modal-tools">
          <button type="button" class="iconbtn" id="pdf-prev" aria-label="Vorherige Seite">‹</button>
          <span class="pageinfo"><span id="pdf-page">1</span> / <span id="pdf-pages">–</span></span>
          <button type="button" class="iconbtn" id="pdf-next" aria-label="Nächste Seite">›</button>
          <span class="sep" aria-hidden="true"></span>
          <button type="button" class="iconbtn" id="pdf-zoom-out" aria-label="Verkleinern">−</button>
          <button type="button" class="iconbtn" id="pdf-zoom-in" aria-label="Vergrössern">+</button>
          <span class="sep" aria-hidden="true"></span>
          <button type="button" class="iconbtn iconbtn-close" data-close aria-label="Schliessen">✕</button>
        </div>
      </header>
      <div class="modal-body" id="pdf-stage">
        <canvas id="pdf-canvas" aria-label="PDF-Seite"></canvas>
        <p class="pdf-empty" id="pdf-empty">PDF wird geladen …</p>
      </div>
    </div>
  </div>

  <!-- Externe Bibliotheken: Fuse.js (Suche) und PDF.js (Viewer) per CDN -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.min.mjs" type="module"></script>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
